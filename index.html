<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Menu</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="description" content="Sistema de Gestão para Restaurantes" />
  <meta name="author" content="G2 Tech" />

  <meta property="og:title" content="Smart Menu" />
  <meta property="og:description" content="Sistema de Gestão para Restaurantes" />
  <meta property="og:type" content="website" />
  <script>
    // Unified Reset Logic
    const handleReset = () => {
      localStorage.clear();
      sessionStorage.clear();
      
      // Clear cookies
      document.cookie.split(";").forEach((c) => {
          document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/");
      });

      // Redirect to clear URL
      window.location.href = window.location.origin + window.location.pathname + '?reset=' + Date.now();
    };

    // Troubleshoot utility via URL: ?clear=true or ?reset=
    if (window.location.search.includes('clear=true') || window.location.search.includes('reset=')) {
      if (!sessionStorage.getItem('reset_performed')) {
        sessionStorage.setItem('reset_performed', 'true');
        localStorage.clear();
        sessionStorage.clear();
        console.log('Clean state initialized');
      }
    }

    // Hang detection
    window.addEventListener('load', function() {
      setTimeout(function() {
        const root = document.getElementById('root');
        // Check if root is truly empty OR has only whitespace
        if (root && root.innerHTML.trim() === "") {
          console.warn('App failed to mount within 10s');
          const div = document.createElement('div');
          div.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:#020817;color:white;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;font-family:sans-serif;padding:20px;text-align:center;";
          div.innerHTML = "<div style='max-width:400px;background:#0f172a;padding:40px;border-radius:24px;border:1px solid #1e293b;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);'>" +
            "<h3 style='margin:0 0 16px 0;font-size:20px;'>O Smart Menu está demorando para iniciar...</h3>" + 
            "<p style='color:#94a3b8;font-size:14px;line-height:1.6;margin-bottom:24px;'>Isso pode ocorrer devido a dados de cache incompatíveis ou instabilidade momentânea.</p>" +
            "<button id='reset-btn' style='width:100%;padding:14px;background:#ea384c;color:white;border:none;border-radius:12px;font-weight:bold;cursor:pointer;font-size:15px;transition:all 0.2s;'>LIMPAR CACHE E REINICIAR</button>" +
            "</div>";
          document.body.appendChild(div);
          document.getElementById('reset-btn').onclick = handleReset;
        }
      }, 10000);
    });
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
