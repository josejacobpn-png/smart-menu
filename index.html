<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Menu</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="description" content="Sistema de Gestão para Restaurantes" />
  <meta name="author" content="G2 Tech" />

  <meta property="og:title" content="Smart Menu" />
  <meta property="og:description" content="Sistema de Gestão para Restaurantes" />
  <meta property="og:type" content="website" />
  <script>
    // Troubleshoot utility via URL: ?clear=true
    if (window.location.search.includes('clear=true')) {
      localStorage.clear();
      sessionStorage.clear();
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (registrations) {
          for (let registration of registrations) { registration.unregister(); }
        });
      }
      window.location.href = window.location.origin + window.location.pathname;
    }

    // Hang detection
    window.addEventListener('load', function() {
      setTimeout(function() {
        const root = document.getElementById('root');
        if (root && root.innerHTML === "") {
          const div = document.createElement('div');
          div.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);color:white;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;font-family:sans-serif;padding:20px;text-align:center;";
          div.innerHTML = "<h3>O Smart Menu está demorando para iniciar...</h3><p>Isso pode ser causado por cache corrompido em abas normais.</p><button onclick='localStorage.clear();sessionStorage.clear();window.location.href=\"?clear=true\"' style='padding:12px 24px;background:#ea384c;color:white;border:none;border-radius:8px;font-weight:bold;cursor:pointer;margin-top:20px;'>LIMPAR TUDO E REINICIAR</button>";
          document.body.appendChild(div);
        }
      }, 10000);
    });
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
